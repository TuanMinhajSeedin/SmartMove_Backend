<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Data Ingestion - Neo4j</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 30px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #dc3545;
            animation: pulse 2s infinite;
        }

        .status-indicator.connected {
            background: #28a745;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .upload-section {
            margin-bottom: 30px;
            padding: 25px;
            background: #f8f9fa;
            border-radius: 8px;
            border: 2px dashed #dee2e6;
        }

        .file-input-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .file-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #dee2e6;
            border-radius: 6px;
            font-size: 1em;
            cursor: pointer;
            background: white;
        }

        .file-input:hover {
            border-color: #667eea;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            margin-top: 15px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover:not(:disabled) {
            background: #218838;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(40, 167, 69, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .preview-section {
            margin-top: 30px;
        }

        .table-container {
            margin-bottom: 30px;
            overflow-x: auto;
        }

        .table-title {
            font-size: 1.3em;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            padding: 10px;
            background: #667eea;
            color: white;
            border-radius: 6px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            overflow: hidden;
        }

        thead {
            background: #667eea;
            color: white;
        }

        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid #5568d3;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #dee2e6;
        }

        tbody tr:hover {
            background: #f8f9fa;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .location-header {
            background: #e7f3ff;
            font-weight: 600;
            color: #0066cc;
        }

        .message {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .stat-card {
            flex: 1;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 6px;
            text-align: center;
        }

        .stat-value {
            font-size: 2em;
            font-weight: 600;
            color: #667eea;
        }

        .stat-label {
            color: #666;
            margin-top: 5px;
        }

        .locations-section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .locations-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .locations-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
            max-height: 300px;
            overflow-y: auto;
            padding: 10px;
            background: white;
            border-radius: 6px;
        }

        .location-item {
            padding: 8px 12px;
            background: #e7f3ff;
            border-radius: 4px;
            color: #0066cc;
            font-weight: 500;
            border: 1px solid #b3d9ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚌 Schedule Data Ingestion</h1>
        <p class="subtitle">Upload JSON schedule files and ingest them into Neo4j database</p>

        <div class="status-bar">
            <div class="connection-status">
                <div class="status-indicator" id="statusIndicator"></div>
                <span id="statusText">Checking connection...</span>
            </div>
            <div id="dbStats" style="display: none;">
                <span style="color: #666;">Locations: <strong id="locationCount">0</strong></span>
                <span style="color: #666; margin-left: 15px;">Schedules: <strong id="scheduleCount">0</strong></span>
            </div>
        </div>

        <div id="messageContainer"></div>

        <div class="locations-section">
            <div class="locations-header">
                <h2 style="margin: 0; color: #333;">📍 Unique Locations in Database</h2>
                <button class="btn btn-primary" onclick="loadLocations()" style="margin: 0; padding: 8px 16px;">
                    🔄 Refresh
                </button>
            </div>
            <div id="locationsContainer" style="text-align: center; color: #666; padding: 20px;">
                Click "Refresh" to load locations
            </div>
        </div>

        <div class="upload-section">
            <h2 style="margin-bottom: 15px; color: #333;">📁 Upload Schedule JSON File</h2>
            <div class="file-input-wrapper">
                <input type="file" id="fileInput" class="file-input" accept=".json">
            </div>
            <button class="btn btn-primary" id="uploadBtn" onclick="uploadFile()">
                Upload & Parse
            </button>
        </div>

        <div id="previewSection" class="preview-section" style="display: none;">
            <h2 style="margin-bottom: 20px; color: #333;">📊 Parsed Schedule Data</h2>
            <div id="tablesContainer"></div>
            <button class="btn btn-success" id="ingestBtn" onclick="ingestData()" style="width: 100%;">
                🚀 Ingest Data into Neo4j
            </button>
        </div>
    </div>

    <script>
        let parsedData = null;

        // Check Neo4j connection on page load
        window.addEventListener('DOMContentLoaded', function() {
            checkConnection();
            loadLocations();
        });

        async function checkConnection() {
            try {
                const response = await fetch('/api/test-connection');
                const data = await response.json();
                
                const indicator = document.getElementById('statusIndicator');
                const statusText = document.getElementById('statusText');
                const dbStats = document.getElementById('dbStats');
                
                if (data.success && data.connected) {
                    indicator.classList.add('connected');
                    statusText.textContent = 'Connected to Neo4j';
                    
                    if (data.statistics) {
                        document.getElementById('locationCount').textContent = data.statistics.locations;
                        document.getElementById('scheduleCount').textContent = data.statistics.schedules;
                        dbStats.style.display = 'block';
                    }
                } else {
                    indicator.classList.remove('connected');
                    statusText.textContent = 'Not connected: ' + (data.message || 'Unknown error');
                }
            } catch (error) {
                const indicator = document.getElementById('statusIndicator');
                const statusText = document.getElementById('statusText');
                indicator.classList.remove('connected');
                statusText.textContent = 'Connection error: ' + error.message;
            }
        }

        function showMessage(text, type = 'info') {
            const container = document.getElementById('messageContainer');
            container.innerHTML = `<div class="message ${type}">${text}</div>`;
            setTimeout(() => {
                container.innerHTML = '';
            }, 5000);
        }

        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const uploadBtn = document.getElementById('uploadBtn');
            
            if (!fileInput.files || fileInput.files.length === 0) {
                showMessage('Please select a JSON file', 'error');
                return;
            }

            const file = fileInput.files[0];
            const formData = new FormData();
            formData.append('file', file);

            uploadBtn.disabled = true;
            uploadBtn.innerHTML = 'Uploading... <span class="loading"></span>';

            try {
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    parsedData = data;
                    showMessage(data.message + (data.route_type ? ` (Route Type: ${data.route_type})` : ''), 'success');
                    displayParsedData(data.parsed_tables, data.route_type);
                    document.getElementById('previewSection').style.display = 'block';
                } else {
                    showMessage(data.message, 'error');
                }
            } catch (error) {
                showMessage('Error uploading file: ' + error.message, 'error');
            } finally {
                uploadBtn.disabled = false;
                uploadBtn.innerHTML = 'Upload & Parse';
            }
        }

        function displayParsedData(tables, routeType) {
            const container = document.getElementById('tablesContainer');
            container.innerHTML = '';

            // Add route type info if available
            if (routeType && routeType !== 'Unknown') {
                const routeTypeInfo = document.createElement('div');
                routeTypeInfo.style.cssText = 'padding: 10px; margin-bottom: 15px; background: #e7f3ff; border-radius: 6px; color: #0066cc; font-weight: 600;';
                routeTypeInfo.textContent = `📍 Route Type: ${routeType}`;
                container.appendChild(routeTypeInfo);
            }

            tables.forEach((table, tableIndex) => {
                const tableDiv = document.createElement('div');
                tableDiv.className = 'table-container';

                const title = document.createElement('div');
                title.className = 'table-title';
                title.textContent = `Table ${table.table_number} (${table.headers.length} locations, ${table.rows.length} trips)`;
                tableDiv.appendChild(title);

                // Create table
                const tableEl = document.createElement('table');
                
                // Create header row
                const thead = document.createElement('thead');
                const headerRow = document.createElement('tr');
                
                // Add Trip Number header
                const tripHeader = document.createElement('th');
                tripHeader.textContent = 'Trip Number';
                headerRow.appendChild(tripHeader);
                
                // Add location headers
                table.headers.forEach(header => {
                    const th = document.createElement('th');
                    th.textContent = header;
                    th.className = 'location-header';
                    headerRow.appendChild(th);
                });
                
                thead.appendChild(headerRow);
                tableEl.appendChild(thead);

                // Create body
                const tbody = document.createElement('tbody');
                table.rows.forEach(row => {
                    const tr = document.createElement('tr');
                    
                    // Trip number cell
                    const tripCell = document.createElement('td');
                    tripCell.textContent = row.trip_number || '-';
                    tripCell.style.fontWeight = '600';
                    tr.appendChild(tripCell);
                    
                    // Location time cells
                    table.headers.forEach(header => {
                        const td = document.createElement('td');
                        const time = row.location_times[header] || '-';
                        td.textContent = time;
                        if (time !== '-') {
                            td.style.color = '#0066cc';
                            td.style.fontWeight = '500';
                        }
                        tr.appendChild(td);
                    });
                    
                    tbody.appendChild(tr);
                });
                
                tableEl.appendChild(tbody);
                tableDiv.appendChild(tableEl);
                container.appendChild(tableDiv);
            });
        }

        async function ingestData() {
            if (!parsedData) {
                showMessage('No data to ingest. Please upload a file first.', 'error');
                return;
            }

            const ingestBtn = document.getElementById('ingestBtn');
            ingestBtn.disabled = true;
            ingestBtn.innerHTML = 'Ingesting... <span class="loading"></span>';

            try {
                const response = await fetch('/api/ingest', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        parsed_tables: parsedData.parsed_tables,
                        route_name: parsedData.route_name,
                        route_type: parsedData.route_type || 'Unknown'
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showMessage(data.message, 'success');
                    
                    // Update statistics
                    if (data.statistics) {
                        document.getElementById('locationCount').textContent = data.statistics.locations;
                        document.getElementById('scheduleCount').textContent = data.statistics.schedules;
                    }
                    
                    // Refresh connection status and locations
                    checkConnection();
                    loadLocations();
                } else {
                    showMessage(data.message, 'error');
                }
            } catch (error) {
                showMessage('Error ingesting data: ' + error.message, 'error');
            } finally {
                ingestBtn.disabled = false;
                ingestBtn.innerHTML = '🚀 Ingest Data into Neo4j';
            }
        }

        async function loadLocations() {
            const container = document.getElementById('locationsContainer');
            container.innerHTML = 'Loading locations... <span class="loading"></span>';

            try {
                const response = await fetch('/api/locations');
                const data = await response.json();

                if (data.success && data.locations) {
                    if (data.locations.length === 0) {
                        container.innerHTML = '<p style="color: #666;">No locations found in database. Upload and ingest a schedule file first.</p>';
                    } else {
                        const grid = document.createElement('div');
                        grid.className = 'locations-grid';
                        
                        data.locations.forEach(location => {
                            const item = document.createElement('div');
                            item.className = 'location-item';
                            item.textContent = location;
                            grid.appendChild(item);
                        });
                        
                        container.innerHTML = '';
                        container.appendChild(grid);
                        
                        // Add count info
                        const countInfo = document.createElement('p');
                        countInfo.style.marginTop = '10px';
                        countInfo.style.color = '#666';
                        countInfo.textContent = `Total: ${data.count} unique location(s)`;
                        container.appendChild(countInfo);
                    }
                } else {
                    container.innerHTML = '<p style="color: #dc3545;">Error loading locations: ' + (data.message || 'Unknown error') + '</p>';
                }
            } catch (error) {
                container.innerHTML = '<p style="color: #dc3545;">Error loading locations: ' + error.message + '</p>';
            }
        }
    </script>
</body>
</html>
